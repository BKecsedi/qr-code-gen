<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QR Code Generator</title>
    <link rel="stylesheet" href="/style.css">
</head>
<body>
    <div class="container">
        <h1>QR Code Generator</h1>
        <form action="/generate" method="POST">
            <input type="text" name="url" placeholder="Enter URL here..." required>
            <button type="submit">Generate</button>
        </form>

        <div class="qr-result">
            <img src="qr_img.png" alt="Your QR Code" onerror="this.style.display='none'" onload="this.style.display='block'">
            <br>
            <a href="qr_img.png" download class="download-btn">Download Image</a>
        </div>
    </div>
</body>
